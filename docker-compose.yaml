services:
  # =====================================================================
  # recorder: 纯录制，只负责 WebSocket 采集 + 本地落盘
  # =====================================================================
  recorder:
    build: .
    container_name: narci-recorder
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/spot_recorder.yaml
      # 可选: 覆盖为单币种
      # - NARCI_SYMBOL=ETHUSDT
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8079:8079"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # cloud-sync: 独立 sidecar，定时将本地数据推送至 Google Drive
  # 与 recorder 通过共享 volume 解耦，互不阻塞
  # =====================================================================
  cloud-sync:
    image: rclone/rclone:latest
    container_name: narci-cloud-sync
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # 从环境变量生成 rclone 配置
        mkdir -p /root/.config/rclone
        cat > /root/.config/rclone/rclone.conf <<EOF
        [gdrive]
        type = drive
        scope = drive
        token = $${RCLONE_GDRIVE_TOKEN}
        root_folder_id = $${RCLONE_GDRIVE_FOLDER_ID}
        EOF

        echo "[cloud-sync] rclone 配置已生成，开始定时同步..."
        echo "[cloud-sync] 远端: $${NARCI_RCLONE_REMOTE}"
        echo "[cloud-sync] 间隔: $${SYNC_INTERVAL:-300}s"

        # 确保远端目录存在
        rclone mkdir "$${NARCI_RCLONE_REMOTE}" 2>/dev/null || true

        # 定时同步循环
        while true; do
          echo "[cloud-sync] 开始同步..."
          rclone copy /data "$${NARCI_RCLONE_REMOTE}" \
            --transfers 2 \
            --log-level NOTICE \
            --no-traverse \
            --tpslimit 8 \
            --tpslimit-burst 8
          echo "[cloud-sync] 同步完成，等待 $${SYNC_INTERVAL:-300}s..."
          sleep $${SYNC_INTERVAL:-300}
        done
    environment:
      - NARCI_RCLONE_REMOTE=${NARCI_RCLONE_REMOTE:-gdrive:/narci_raw}
      - RCLONE_GDRIVE_TOKEN=${RCLONE_GDRIVE_TOKEN:-}
      - RCLONE_GDRIVE_FOLDER_ID=${RCLONE_GDRIVE_FOLDER_ID:-}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-300}
    volumes:
      - narci-data:/data:ro
    restart: unless-stopped
    depends_on:
      - recorder
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  narci-data:
