services:
  # =====================================================================
  # recorder-spot: 现货 JPY 全交易对录制
  # =====================================================================
  recorder-spot:
    build: .
    container_name: narci-recorder-spot
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/spot_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8079:8079"  # healthcheck
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # recorder-umfut: U 本位合约 USDT 主流对录制
  # （币安合约不支持 JPY，这些 USDT 对用于对冲参考 / 信号源 / 期现套利）
  # =====================================================================
  recorder-umfut:
    build: .
    container_name: narci-recorder-umfut
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/um_future_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8080:8079"  # 宿主机 8080 -> 容器内 8079
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # recorder-coincheck: Coincheck 现货 JPY 录制（主力交易所，优先级最高）
  # =====================================================================
  recorder-coincheck:
    build: .
    container_name: narci-recorder-coincheck
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/coincheck_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8081:8079"  # 宿主机 8081 -> 容器内 8079
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # cloud-sync: 独立 sidecar，定时将本地数据推送至 Google Drive
  # 与 recorder 通过共享 volume 解耦，互不阻塞
  # =====================================================================
  cloud-sync:
    image: rclone/rclone:latest
    container_name: narci-cloud-sync
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # 从环境变量生成 rclone 配置
        mkdir -p /root/.config/rclone
        cat > /root/.config/rclone/rclone.conf <<EOF
        [gdrive]
        type = drive
        scope = drive
        token = $${RCLONE_GDRIVE_TOKEN}
        root_folder_id = $${RCLONE_GDRIVE_FOLDER_ID}
        EOF

        echo "[cloud-sync] rclone 配置已生成，开始定时同步..."
        echo "[cloud-sync] 远端: $${NARCI_RCLONE_REMOTE}"
        echo "[cloud-sync] 间隔: $${SYNC_INTERVAL:-300}s"

        # 确保远端目录存在
        rclone mkdir "$${NARCI_RCLONE_REMOTE}" 2>/dev/null || true

        # 定时同步循环
        while true; do
          echo "[cloud-sync] 开始同步..."
          rclone copy /data "$${NARCI_RCLONE_REMOTE}" \
            --transfers 2 \
            --log-level NOTICE \
            --no-traverse \
            --tpslimit 8 \
            --tpslimit-burst 8
          echo "[cloud-sync] 同步完成，等待 $${SYNC_INTERVAL:-300}s..."
          sleep $${SYNC_INTERVAL:-300}
        done
    environment:
      - NARCI_RCLONE_REMOTE=${NARCI_RCLONE_REMOTE:-gdrive:/narci_raw}
      - RCLONE_GDRIVE_TOKEN=${RCLONE_GDRIVE_TOKEN:-}
      - RCLONE_GDRIVE_FOLDER_ID=${RCLONE_GDRIVE_FOLDER_ID:-}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-300}
    volumes:
      - narci-data:/data:ro
    restart: unless-stopped
    depends_on:
      - recorder-spot
      - recorder-umfut
      - recorder-coincheck
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  narci-data:
