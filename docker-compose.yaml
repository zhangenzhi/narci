services:
  # =====================================================================
  # 云服务器职责: 录制 (10min/文件) + 即时推送至 Google Cloud
  # compact / validate 请在本地拉取数据后执行，节省云端计算资源
  # =====================================================================
  recorder:
    build: .
    container_name: narci-recorder
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/spot_recorder.yaml
      # rclone 推送目标 (录制器落盘后自动 rclone copy)
      # 设置此变量启用每 10min 自动推送; 留空则仅本地落盘
      - NARCI_RCLONE_REMOTE=${NARCI_RCLONE_REMOTE:-gdrive:/narci_raw}
      # rclone Google Drive 授权 token
      # 获取方式: 本地 rclone config 授权后，从 ~/.config/rclone/rclone.conf 复制 token = {...} 的值
      - RCLONE_GDRIVE_TOKEN=${RCLONE_GDRIVE_TOKEN:-}
      - RCLONE_GDRIVE_FOLDER_ID=${RCLONE_GDRIVE_FOLDER_ID:-}
      # 可选: 覆盖为单币种
      # - NARCI_SYMBOL=ETHUSDT
    volumes:
      - ./replay_buffer:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8079:8079"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
