# =============================================================================
# Narci Docker Compose — 通过 profiles 控制不同部署场景
#
# 用法：
#   AWS Tokyo  (Coincheck):  COMPOSE_PROFILES=tokyo   docker compose up -d
#   AWS US     (Binance):    COMPOSE_PROFILES=global   docker compose up -d
#   本地全跑   (全部):       COMPOSE_PROFILES=tokyo,global docker compose up -d
#
# 在 .env 文件中设置 COMPOSE_PROFILES 可避免每次手动指定
# =============================================================================

services:
  # =====================================================================
  # recorder-coincheck: Coincheck 现货 JPY（主力，需日本 IP）
  # Profile: tokyo
  # =====================================================================
  recorder-coincheck:
    build: .
    container_name: narci-recorder-coincheck
    profiles: [tokyo]
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/coincheck_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8079:8079"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # recorder-binance-jp: Binance Japan 现货 JPY（日本 IP 可用，WS 走 data-stream.binance.vision）
  # Profile: tokyo
  # =====================================================================
  recorder-binance-jp:
    build: .
    container_name: narci-recorder-binance-jp
    profiles: [tokyo]
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/binance_jp_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8080:8079"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # recorder-bitbank: bitbank 现货 JPY（socket.io v2 transport,
  #   需要 python-socketio[asyncio_client]）
  # Profile: tokyo
  # 上线条件:narci-tokyo `git pull && docker compose up -d recorder-bitbank`
  # 验证:5-10 min recorder soak,检查 replay_buffer/realtime/bitbank/spot/l2/
  #   下 parquet 落盘正常 (4 列、symbol/side/price/qty 类型对、size 非零)
  # =====================================================================
  recorder-bitbank:
    build: .
    container_name: narci-recorder-bitbank
    profiles: [tokyo]
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/bitbank_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8082:8079"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # recorder-binance-spot: Binance 国际现货（需非日本 IP）
  # Profile: global
  # =====================================================================
  recorder-binance-spot:
    build: .
    container_name: narci-recorder-binance-spot
    profiles: [global]
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/spot_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8079:8079"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # recorder-binance-umfut: Binance U 本位合约（需非日本 IP）
  # Profile: global
  # =====================================================================
  recorder-binance-umfut:
    build: .
    container_name: narci-recorder-binance-umfut
    profiles: [global]
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/um_future_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8080:8079"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # cloud-sync: rclone sidecar → Google Drive / S3
  # 无 profile 限制（所有部署都需要推送）
  # =====================================================================
  cloud-sync:
    image: rclone/rclone:latest
    container_name: narci-cloud-sync
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mkdir -p /root/.config/rclone
        REMOTE="$${NARCI_RCLONE_REMOTE}"

        if echo "$${REMOTE}" | grep -q "^s3://"; then
          cat > /root/.config/rclone/rclone.conf <<EOF
        [s3]
        type = s3
        provider = AWS
        region = $${AWS_REGION:-ap-northeast-1}
        env_auth = true
        storage_class = STANDARD_IA
        EOF
          RCLONE_REMOTE=$(echo "$${REMOTE}" | sed 's|s3://|s3:|')
        else
          cat > /root/.config/rclone/rclone.conf <<EOF
        [gdrive]
        type = drive
        scope = drive
        token = $${RCLONE_GDRIVE_TOKEN}
        root_folder_id = $${RCLONE_GDRIVE_FOLDER_ID}
        EOF
          RCLONE_REMOTE="$${REMOTE}"
        fi

        echo "[cloud-sync] remote: $${RCLONE_REMOTE}"
        echo "[cloud-sync] interval: $${SYNC_INTERVAL:-600}s"
        rclone mkdir "$${RCLONE_REMOTE}" 2>/dev/null || true

        while true; do
          echo "[cloud-sync] syncing..."
          # --no-traverse 撤掉 (2026-05-15):rclone GDrive 后端 + --no-traverse
          # 对新嵌套目录 (如 bitbank/spot/l2/) 会静默 skip,因为 rclone 没去 list
          # 目标,GDrive 又不会自动建中间 folder。常规每 600s 一次 traverse 在我们
          # 这种 source-driven 场景代价微小 (~几百 ms),换来新 venue 自动 catch up。
          rclone copy /data "$${RCLONE_REMOTE}" \
            --transfers 4 \
            --log-level NOTICE \
            --tpslimit 8 \
            --tpslimit-burst 8
          echo "[cloud-sync] done, sleeping $${SYNC_INTERVAL:-600}s"
          sleep $${SYNC_INTERVAL:-600}
        done
    environment:
      - NARCI_RCLONE_REMOTE=${NARCI_RCLONE_REMOTE:-gdrive:/narci_raw}
      - AWS_REGION=${AWS_REGION:-ap-northeast-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - RCLONE_GDRIVE_TOKEN=${RCLONE_GDRIVE_TOKEN:-}
      - RCLONE_GDRIVE_FOLDER_ID=${RCLONE_GDRIVE_FOLDER_ID:-}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-600}
    volumes:
      - narci-data:/data:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  narci-data:
