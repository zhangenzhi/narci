# =============================================================================
# Narci Docker Compose — 通过 profiles 控制不同部署场景
#
# 用法：
#   AWS Tokyo  (Coincheck):  COMPOSE_PROFILES=tokyo   docker compose up -d
#   AWS US     (Binance):    COMPOSE_PROFILES=global   docker compose up -d
#   本地全跑   (全部):       COMPOSE_PROFILES=tokyo,global docker compose up -d
#
# 在 .env 文件中设置 COMPOSE_PROFILES 可避免每次手动指定
# =============================================================================

services:
  # =====================================================================
  # recorder-coincheck: Coincheck 现货 JPY（主力，需日本 IP）
  # Profile: tokyo
  # =====================================================================
  recorder-coincheck:
    build: .
    container_name: narci-recorder-coincheck
    profiles: [tokyo]
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/coincheck_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8079:8079"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # recorder-binance-jp: Binance Japan 现货 JPY（日本 IP 可用，WS 走 data-stream.binance.vision）
  # Profile: tokyo
  # =====================================================================
  recorder-binance-jp:
    build: .
    container_name: narci-recorder-binance-jp
    profiles: [tokyo]
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/binance_jp_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8080:8079"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # recorder-bitbank: bitbank 现货 JPY（socket.io v2 transport,
  #   需要 python-socketio[asyncio_client]）
  # Profile: tokyo
  # 上线条件:narci-tokyo `git pull && docker compose up -d recorder-bitbank`
  # 验证:5-10 min recorder soak,检查 replay_buffer/realtime/bitbank/spot/l2/
  #   下 parquet 落盘正常 (4 列、symbol/side/price/qty 类型对、size 非零)
  # =====================================================================
  recorder-bitbank:
    build: .
    container_name: narci-recorder-bitbank
    profiles: [tokyo]
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/bitbank_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8082:8079"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # tokyo-extra profile: bitFlyer + GMO recorders
  # =====================================================================
  # ⚠️ 这 4 个 recorder **不放在默认 tokyo profile**,因为 t4g.small (2GB)
  # 加上现有 3 个 recorder + cloud-sync 已经接近内存上限。开 tokyo-extra
  # 前必须先把 narci-tokyo 升到 t4g.medium (4GB) 或 t4g.large (8GB)。
  #
  # 启用方法:
  #   COMPOSE_PROFILES=tokyo,tokyo-extra docker compose up -d
  # 或 .env 里设置:
  #   COMPOSE_PROFILES=tokyo,tokyo-extra
  #
  # 资源验证:跑 `deploy/measure_recorder_footprint.sh` 看实例剩余内存
  # 是否够 4 个 recorder。每个加了 mem_limit=256m 作硬上限保护。
  # =====================================================================

  recorder-bitflyer-spot:
    build: .
    container_name: narci-recorder-bitflyer-spot
    profiles: [tokyo-extra]
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/bitflyer_spot_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8083:8079"
    mem_limit: 256m
    restart: unless-stopped
    logging:
      driver: json-file
      options: {max-size: "50m", max-file: "5"}

  recorder-bitflyer-fx:
    build: .
    container_name: narci-recorder-bitflyer-fx
    profiles: [tokyo-extra]
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/bitflyer_fx_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8084:8079"
    mem_limit: 256m
    restart: unless-stopped
    logging:
      driver: json-file
      options: {max-size: "50m", max-file: "5"}

  recorder-gmo-spot:
    build: .
    container_name: narci-recorder-gmo-spot
    profiles: [tokyo-extra]
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/gmo_spot_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8085:8079"
    mem_limit: 256m
    restart: unless-stopped
    logging:
      driver: json-file
      options: {max-size: "50m", max-file: "5"}

  recorder-gmo-leverage:
    build: .
    container_name: narci-recorder-gmo-leverage
    profiles: [tokyo-extra]
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/gmo_leverage_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8086:8079"
    mem_limit: 256m
    restart: unless-stopped
    logging:
      driver: json-file
      options: {max-size: "50m", max-file: "5"}

  # =====================================================================
  # recorder-binance-spot: Binance 国际现货（需非日本 IP）
  # Profile: global
  # =====================================================================
  recorder-binance-spot:
    build: .
    container_name: narci-recorder-binance-spot
    profiles: [global]
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/spot_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8079:8079"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # recorder-binance-umfut: Binance U 本位合约（需非日本 IP）
  # Profile: global
  # =====================================================================
  recorder-binance-umfut:
    build: .
    container_name: narci-recorder-binance-umfut
    profiles: [global]
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/um_future_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8080:8079"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # cloud-sync: rclone sidecar → Google Drive / S3
  # 无 profile 限制（所有部署都需要推送）
  # =====================================================================
  cloud-sync:
    image: rclone/rclone:latest
    container_name: narci-cloud-sync
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mkdir -p /root/.config/rclone
        REMOTE="$${NARCI_RCLONE_REMOTE}"

        if echo "$${REMOTE}" | grep -q "^s3://"; then
          cat > /root/.config/rclone/rclone.conf <<EOF
        [s3]
        type = s3
        provider = AWS
        region = $${AWS_REGION:-ap-northeast-1}
        env_auth = true
        storage_class = STANDARD_IA
        EOF
          RCLONE_REMOTE=$(echo "$${REMOTE}" | sed 's|s3://|s3:|')
        else
          cat > /root/.config/rclone/rclone.conf <<EOF
        [gdrive]
        type = drive
        scope = drive
        token = $${RCLONE_GDRIVE_TOKEN}
        root_folder_id = $${RCLONE_GDRIVE_FOLDER_ID}
        EOF
          RCLONE_REMOTE="$${REMOTE}"
        fi

        echo "[cloud-sync] remote: $${RCLONE_REMOTE}"
        echo "[cloud-sync] interval: $${SYNC_INTERVAL:-600}s"
        rclone mkdir "$${RCLONE_REMOTE}" 2>/dev/null || true

        # Per-venue stale alert (2026-05-16):扫 /data/realtime/<exchange>/<market>/l2/,
        # 若某 venue 24h 内无新 parquet shard,在 stdout 打 [STALE-VENUE-ALERT]。
        # 不接 PagerDuty / webhook,只进 docker logs,后续可人工 grep 或外接告警。
        # 设计动机:bitbank/bitFlyer/GMO/Coincheck 无官方 archive (option A),
        # recorder 死了就是真没了 → 监控比 Binance 更紧。
        STALE_THRESHOLD_MIN=$${NARCI_STALE_ALERT_MIN:-1440}

        while true; do
          echo "[cloud-sync] syncing..."
          # --no-traverse 撤掉 (2026-05-15):rclone GDrive 后端 + --no-traverse
          # 对新嵌套目录 (如 bitbank/spot/l2/) 会静默 skip,因为 rclone 没去 list
          # 目标,GDrive 又不会自动建中间 folder。常规每 600s 一次 traverse 在我们
          # 这种 source-driven 场景代价微小 (~几百 ms),换来新 venue 自动 catch up。
          rclone copy /data "$${RCLONE_REMOTE}" \
            --transfers 4 \
            --log-level NOTICE \
            --tpslimit 8 \
            --tpslimit-burst 8
          echo "[cloud-sync] done"

          # ---- per-venue staleness check ----
          for vd in /data/realtime/*/*/l2; do
            [ -d "$$vd" ] || continue
            fresh=$$(find "$$vd" -maxdepth 1 -name "*.parquet" -mmin "-$${STALE_THRESHOLD_MIN}" -print -quit 2>/dev/null)
            if [ -z "$$fresh" ]; then
              # 数一下到底有没有任何 shard,区分 "目录空" vs "陈旧"
              total=$$(find "$$vd" -maxdepth 1 -name "*.parquet" 2>/dev/null | wc -l)
              echo "[STALE-VENUE-ALERT] venue_dir=$$vd no_new_shards_in=$${STALE_THRESHOLD_MIN}min total_shards=$$total"
            fi
          done

          echo "[cloud-sync] sleeping $${SYNC_INTERVAL:-600}s"
          sleep $${SYNC_INTERVAL:-600}
        done
    environment:
      - NARCI_RCLONE_REMOTE=${NARCI_RCLONE_REMOTE:-gdrive:/narci_raw}
      - AWS_REGION=${AWS_REGION:-ap-northeast-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - RCLONE_GDRIVE_TOKEN=${RCLONE_GDRIVE_TOKEN:-}
      - RCLONE_GDRIVE_FOLDER_ID=${RCLONE_GDRIVE_FOLDER_ID:-}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-600}
      - NARCI_STALE_ALERT_MIN=${NARCI_STALE_ALERT_MIN:-1440}
    volumes:
      - narci-data:/data:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  narci-data:
