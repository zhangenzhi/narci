services:
  # =====================================================================
  # recorder-spot: 现货 JPY 全交易对录制
  # =====================================================================
  recorder-spot:
    build: .
    container_name: narci-recorder-spot
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/spot_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8079:8079"  # healthcheck
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # recorder-umfut: U 本位合约 USDT 主流对录制
  # （币安合约不支持 JPY，这些 USDT 对用于对冲参考 / 信号源 / 期现套利）
  # =====================================================================
  recorder-umfut:
    build: .
    container_name: narci-recorder-umfut
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/um_future_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8080:8079"  # 宿主机 8080 -> 容器内 8079
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # recorder-coincheck: Coincheck 现货 JPY 录制（主力交易所，优先级最高）
  # =====================================================================
  recorder-coincheck:
    build: .
    container_name: narci-recorder-coincheck
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/coincheck_recorder.yaml
    volumes:
      - narci-data:/app/replay_buffer
      - ./configs:/app/configs:ro
    ports:
      - "8081:8079"  # 宿主机 8081 -> 容器内 8079
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # =====================================================================
  # cloud-sync: 独立 sidecar，定时将本地数据推送至云端
  # 通过 NARCI_RCLONE_REMOTE 环境变量决定目标：
  #   - s3://bucket-name/prefix   → 使用 AWS S3（推荐；EC2 instance profile 自动鉴权）
  #   - gdrive:/narci_raw         → 使用 Google Drive（legacy；需 RCLONE_GDRIVE_TOKEN）
  # =====================================================================
  cloud-sync:
    image: rclone/rclone:latest
    container_name: narci-cloud-sync
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mkdir -p /root/.config/rclone
        REMOTE="$${NARCI_RCLONE_REMOTE}"

        # 自动识别远端类型并生成 rclone.conf
        if echo "$${REMOTE}" | grep -q "^s3://"; then
          # S3: 依赖 EC2 instance profile / IAM role（容器内需暴露 AWS env 变量或 metadata）
          cat > /root/.config/rclone/rclone.conf <<EOF
        [s3]
        type = s3
        provider = AWS
        region = $${AWS_REGION:-ap-northeast-1}
        env_auth = true
        storage_class = STANDARD_IA
        EOF
          # 把 s3://bucket/prefix 转成 rclone 的 s3:bucket/prefix 写法
          RCLONE_REMOTE=$(echo "$${REMOTE}" | sed 's|s3://|s3:|')
        else
          # Google Drive (legacy)
          cat > /root/.config/rclone/rclone.conf <<EOF
        [gdrive]
        type = drive
        scope = drive
        token = $${RCLONE_GDRIVE_TOKEN}
        root_folder_id = $${RCLONE_GDRIVE_FOLDER_ID}
        EOF
          RCLONE_REMOTE="$${REMOTE}"
        fi

        echo "[cloud-sync] 远端: $${RCLONE_REMOTE}"
        echo "[cloud-sync] 间隔: $${SYNC_INTERVAL:-300}s"

        # 确保目标目录/bucket 存在（S3 mkdir 会 no-op）
        rclone mkdir "$${RCLONE_REMOTE}" 2>/dev/null || true

        while true; do
          echo "[cloud-sync] 开始同步..."
          rclone copy /data "$${RCLONE_REMOTE}" \
            --transfers 4 \
            --log-level NOTICE \
            --no-traverse \
            --tpslimit 8 \
            --tpslimit-burst 8
          echo "[cloud-sync] 同步完成，等待 $${SYNC_INTERVAL:-300}s..."
          sleep $${SYNC_INTERVAL:-300}
        done
    environment:
      # 默认 Google Drive（5TB 免费空间）；可在 .env 切 S3
      - NARCI_RCLONE_REMOTE=${NARCI_RCLONE_REMOTE:-gdrive:/narci_raw}
      - AWS_REGION=${AWS_REGION:-ap-northeast-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - RCLONE_GDRIVE_TOKEN=${RCLONE_GDRIVE_TOKEN:-}
      - RCLONE_GDRIVE_FOLDER_ID=${RCLONE_GDRIVE_FOLDER_ID:-}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-600}
    volumes:
      - narci-data:/data:ro
    restart: unless-stopped
    depends_on:
      - recorder-spot
      - recorder-umfut
      - recorder-coincheck
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  narci-data:
