services:
  recorder:
    build: .
    container_name: narci-recorder
    command: ["record"]
    environment:
      - NARCI_CONFIG=configs/um_future_recorder.yaml
      # 可选: 覆盖为单币种
      # - NARCI_SYMBOL=ETHUSDT
    volumes:
      # 数据持久化到宿主机
      - ./replay_buffer:/app/replay_buffer
      # 开发时热更新配置 (不重建镜像)
      - ./configs:/app/configs:ro
    ports:
      - "8079:8079"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # 按需手动执行 compact
  # docker compose run --rm compact
  compact:
    build: .
    container_name: narci-compact
    command: ["compact"]
    environment:
      - NARCI_SYMBOL=ETHUSDT
      # 可选: 指定日期
      # - NARCI_DATE=2026-02-22
    volumes:
      - ./replay_buffer:/app/replay_buffer
      - ./configs:/app/configs:ro
    profiles:
      - tools
