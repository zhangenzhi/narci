downloader:
  # 数据存储根目录 (与 main.py compact 的 official_dir 对齐，下载产物可直接用作交叉校验源)
  base_dir: "./replay_buffer/official_validation"

  # 并发控制 (L2数据极大，建议降低线程数以防内存溢出)
  max_workers: 3

  # 市场类型: "spot" | "um_futures" | "both" (同时下载两个市场)
  market_type: "both"

  # 任务列表
  # 支持两种写法:
  #   1) 平铺列表 (旧) - 对每个 market 都尝试同一组 symbols
  #   2) 按 market 分组 (推荐) - JPY pair 只在 spot, um_futures 没有 JPY 永续
  symbols:
    spot:
      - "BTCUSDT"
      - "ETHUSDT"
      - "SOLUSDT"
      - "BNBUSDT"
      - "XRPUSDT"
      - "DOGEUSDT"
      - "BTCJPY"
      - "ETHJPY"
      - "SOLJPY"
      - "XRPJPY"
      - "DOGEJPY"
    um_futures:
      - "BTCUSDT"
      - "ETHUSDT"
      - "SOLUSDT"
      - "BNBUSDT"
      - "XRPUSDT"
      - "DOGEUSDT"

  # 数据类型:
  # - aggTrades (成交数据, 较小)
  # NOTE: bookTicker 在 Vision 上拿不到我们要的范围 ——
  #   spot daily/bookTicker/ 从未存在 (只有 aggTrades/klines/trades),
  #   futures/um daily/bookTicker/ 最后一天是 2024-03-30, 已停更 2 年多.
  #   2026-05-14 临时撤掉, 避免每天 cron 跑 459 个 404. 详见
  #   deploy/donor/NARCI_DONOR_INTERFACE.md "bookTicker 不可用" 段.
  data_types:
    - "aggTrades"

  # 时间范围
  date_range:
    # 起始日期。2026-05-14 收紧到 2026-04-17，两条原因合一：
    #   (a) donor 外置 SSD 只剩 170 GiB。全量 248 天 × 12 USDT × ~75MB
    #       ≈ 235 GiB 装不下。
    #   (b) v5 basis_um_bps 优先级是 nyx 训练池窗口 04-17→05-09
    #       (commit 555bb30)。先盖这一段。
    # aggTrades 已 backfill 到 2024-03-01，download_day idempotent 会
    # skip 已存在的，不重复扫。
    # 后续等 donor SSD 腾出空间，再回退到 2025-09-01 拉更长 bookTicker
    # 历史；training pool 想扩到 2026-03-06 也是同样路径。
    start_date: "2026-04-17"

    # 结束日期:
    # - "auto": 自动下载到昨天 (适合每日定时任务)
    # - "2026-02-01": 指定具体日期
    end_date: "auto"

  # 稳定性配置
  retry:
    max_retries: 5
    backoff_factor: 2  # 等待时间: 2s, 4s, 8s...
    timeout: 30        # 单次请求超时秒数
