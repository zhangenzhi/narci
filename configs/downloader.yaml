downloader:
  # 数据存储根目录 (与 main.py compact 的 official_dir 对齐，下载产物可直接用作交叉校验源)
  base_dir: "./replay_buffer/official_validation"

  # 并发控制 (L2数据极大，建议降低线程数以防内存溢出)
  max_workers: 3

  # 市场类型: "spot" | "um_futures" | "both" (同时下载两个市场)
  market_type: "both"

  # 任务列表
  symbols:
    - "BTCUSDT"
    - "ETHUSDT"
    - "SOLUSDT"
    - "BNBUSDT"
    - "XRPUSDT"
    - "DOGEUSDT"

  # 数据类型:
  # - aggTrades (成交数据, 较小)
  # - bookTicker (顶档逐笔 best_bid/ask, 用于 v5 perp-spot basis 历史回补;
  #   2026-05-14 加, 大约比 aggTrades 多 5-10x 体积)
  data_types:
    - "aggTrades"
    - "bookTicker"

  # 时间范围
  date_range:
    # 追溯起始日期 (约 6 个月)
    start_date: "2025-09-01"

    # 结束日期:
    # - "auto": 自动下载到昨天 (适合每日定时任务)
    # - "2026-02-01": 指定具体日期
    end_date: "auto"

  # 稳定性配置
  retry:
    max_retries: 5
    backoff_factor: 2  # 等待时间: 2s, 4s, 8s...
    timeout: 30        # 单次请求超时秒数
