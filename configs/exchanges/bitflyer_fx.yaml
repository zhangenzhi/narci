recorder:
  # ============================================================
  # bitFlyer Lightning FX (永续合约) 录制配置
  # 只有 FX_BTC_JPY 一个 symbol (bitFlyer 没有其它 alt FX)
  # ============================================================
  # 上线条件:tokyo-extra profile + t4g.medium+

  exchange: bitflyer
  market_type: fx

  symbols:
    - "FX_BTC_JPY"

  interval_ms: 100

  save_dir: "./replay_buffer/realtime/"
  save_interval_sec: 600
  # P1 WAL: micro-flush 周期(秒)。事件先入内存,每此间隔原子写成一个
  # .segwal 段;save_loop 每 save_interval_sec 把段合并成规范 RAW。
  # 崩溃最多丢一个 micro-flush(~秒级)而非一个 save_interval。默认 2。
  wal_flush_interval_sec: 2

  snapshot_refresh_on_save: true

  retain_days: 7

  retry:
    wait_seconds: 5

  watchdog_check_interval_sec: 5
  depth_stale_threshold_sec: 180
  trade_stale_threshold_sec: 1800

  endpoints:
    fx:
      ws_url: "wss://ws.lightstream.bitflyer.com/json-rpc"
      snapshot_url: "https://api.bitflyer.com/v1/board?product_code={symbol_upper}"
