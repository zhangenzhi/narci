recorder:
  # ⚠️ 重要说明：
  # Binance U 本位永续合约【不提供 JPY 计价的交易对】，所有合约均为 USDT/USDC 保证金。
  # 若策略主攻 JPY 方向，合约侧仅保留主流 USDT 对作为：
  #   1) 跨币种对冲参考（Delta 对冲 JPY 现货风险）
  #   2) 信号源（USDT 合约流动性/深度远大于现货 JPY，更敏感的价格发现）
  #   3) 期现套利的另一腿
  # 如果不需要合约数据，可把此 symbols 列表置空。
  symbols:
    - "BTCUSDT"
    - "ETHUSDT"
    - "SOLUSDT"
    - "BNBUSDT"
    - "XRPUSDT"
    - "DOGEUSDT"
  
  # 市场类型: "spot" (现货) 或 "um_futures" (U本位合约)
  market_type: "um_futures"
  
  # 深度更新推送频率 (100ms or 1000ms)
  interval_ms: 100
  
  # 数据存储根目录
  save_dir: "./replay_buffer/realtime/"
  
  # 多少秒将内存数据落盘一次 (生成一个自包含快照的 parquet 文件)
  # 2026-05-20 cut 600→60 per echo INTERFACE_ECHO_NARCI.md §13 Delivery 8
  # Ask B Option 3:Phase 1a real-time alpha 需 event-to-disk lag <60s。
  # UM 是 v9_midy_40 binding 的 15/40 features 来源(`r_um*` / `um_*` 全部)。
  # Shard 数量 144/day → 1440/day,daily_compactor merge 不变。
  #
  # 2026-05-22 revert 60→600 — D9 publisher (3a4e572) 已承担 live signal,
  # disk shard 主要服务 backfill/replay,600s 充分。60s × retain_days=7
  # 累积 UM 504K file 对 SG cloud-sync 是潜在物理压力(JP 已先爆见
  # `reco/docs/INCIDENTS/2026-05-21-aws-jp-cloud-sync-stuck.md`),预防性
  # 一并 revert。echo `e3d7153` §19 ACK 撤回 `18a74f2` "60s retained" 立场。
  save_interval_sec: 600
  # P1 WAL: micro-flush 周期(秒)。事件先入内存,每此间隔原子写成一个
  # .segwal 段;save_loop 每 save_interval_sec 把段合并成规范 RAW。
  # 崩溃最多丢一个 micro-flush(~秒级)而非一个 save_interval。默认 2。
  wal_flush_interval_sec: 2

  # P1-A 修法 (2026-05-08)：每次 save_loop 落盘前 REST 重拉一次完整 snapshot
  # 替换内存 book，从源头扔掉 WS 漏 delete 累积的 dust。下游 reconstruct
  # 不再需要 prune 也能拿到干净的 top1。Binance UM 限流 2400/min/IP，
  # 60s × 6 symbols = 6 req/min,0.25% utilization(下调到 60s 后仍 3 个
  # 数量级 headroom)。
  snapshot_refresh_on_save: true
  
  # 自动清理: 删除超过 N 天的本地 parquet 文件 (已推送至云端后释放磁盘)
  # 设为 0 则不清理
  retain_days: 7

  # 错误重试配置
  retry:
    wait_seconds: 5

  # API 节点配置 (支持动态变量 {streams}, {symbol_upper})
  endpoints:
    um_futures:
      # Binance UM 在 2026-04-23 把 WS 流彻底拆开了：
      #   /public, /stream  → 只推 depth (probe 验证：30s 内 119 depth / 0 trade)
      #   /market           → 只推 aggTrade (30s 内 234 trade / 0 depth)
      # adapter (BinanceUmFuturesAdapter.ws_urls) 同时维护两条 WS。
      # 这里 ws_url 只作为单-URL fallback (=depth)，不影响双流逻辑。
      ws_url: "wss://fstream.binance.com/public/stream?streams={streams}"
      snapshot_url: "https://fapi.binance.com/fapi/v1/depth?symbol={symbol_upper}&limit=1000"
    spot:
      ws_url: "wss://stream.binance.com:9443/stream?streams={streams}"
      snapshot_url: "https://api.binance.com/api/v3/depth?symbol={symbol_upper}&limit=1000"