recorder:
  # ============================================================
  # Binance Japan 现货录制配置（日本 IP 可用）
  #
  # WS 用 data-stream.binance.vision（纯行情端点，绕开日本 IP 封锁）
  # REST 快照用 api.binance.com（/api/v3 从日本 IP 可访问）
  # 消息格式与 Binance 国际版一致，复用 BinanceAdapter 解析逻辑
  # ============================================================

  exchange: binance_jp
  market_type: spot

  # Binance 上全部 24 个 JPY 交易对（与 binance_spot.yaml 一致）
  symbols:
    - "BTCJPY"
    - "ETHJPY"
    - "SOLJPY"
    - "BNBJPY"
    - "XRPJPY"
    - "DOGEJPY"
    - "ADAJPY"
    - "LINKJPY"
    - "LTCJPY"
    - "BCHJPY"
    - "TRXJPY"
    - "SUIJPY"
    - "NEARJPY"
    - "APTJPY"
    - "POLJPY"
    - "XLMJPY"
    - "SHIBJPY"
    - "PEPEJPY"
    - "FETJPY"
    - "TAOJPY"
    - "SEIJPY"
    - "LPTJPY"
    - "IOTXJPY"
    - "TRUMPJPY"

  interval_ms: 100
  save_dir: "./replay_buffer/realtime/"
  # 2026-05-20 cut 600→60 per echo INTERFACE_ECHO_NARCI.md §13 Delivery 8
  # Ask B Option 3:Phase 1a real-time alpha 需 event-to-disk lag <60s。
  # BJ 是 v9_midy_40 binding 的 feature 来源(`r_bj` / `bj_imb_*` /
  # `bj_flow_*` / `bj_l2_*` / `basis_bj_bps` 等)。
  # Shard 数量 144/day → 1440/day,daily_compactor merge 不变。
  # 2026-05-22 revert 60→600 — D9 publisher (3a4e572) 已承担 live signal,
  # 60s × retain_days=7 累积 BJ 240K file 是 2026-05-21 JP cloud-sync 卡死
  # root cause。echo `e3d7153` §19 ACK 撤回 `18a74f2` "60s retained" 立场。
  # see incident `reco/docs/INCIDENTS/2026-05-21-aws-jp-cloud-sync-stuck.md`。
  save_interval_sec: 600
  # P1 WAL: micro-flush 周期(秒)。事件先入内存,每此间隔原子写成一个
  # .segwal 段;save_loop 每 save_interval_sec 把段合并成规范 RAW。
  # 崩溃最多丢一个 micro-flush(~秒级)而非一个 save_interval。默认 2。
  wal_flush_interval_sec: 2

  # P1-A 修法 (2026-05-08)：每次落盘前 REST 重拉 snapshot 替换内存 book，
  # 扔掉 WS 漏 delete 累积的 dust。BJ 流量低 + dust 持续严重,这是核心
  # 治本路径。WS 走 data-stream.binance.vision,REST snapshot 走
  # api.binance.com /api/v3/depth;60s × 24 symbols = 24 req/min,
  # Binance spot 1200 req/min/IP 限流仍 2% utilization(50x headroom)。
  snapshot_refresh_on_save: true

  retain_days: 7

  retry:
    wait_seconds: 5
