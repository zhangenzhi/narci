recorder:
  # ============================================================
  # Binance Japan 现货录制配置（日本 IP 可用）
  #
  # WS 用 data-stream.binance.vision（纯行情端点，绕开日本 IP 封锁）
  # REST 快照用 api.binance.com（/api/v3 从日本 IP 可访问）
  # 消息格式与 Binance 国际版一致，复用 BinanceAdapter 解析逻辑
  # ============================================================

  exchange: binance_jp
  market_type: spot

  # Binance 上全部 24 个 JPY 交易对（与 binance_spot.yaml 一致）
  symbols:
    - "BTCJPY"
    - "ETHJPY"
    - "SOLJPY"
    - "BNBJPY"
    - "XRPJPY"
    - "DOGEJPY"
    - "ADAJPY"
    - "LINKJPY"
    - "LTCJPY"
    - "BCHJPY"
    - "TRXJPY"
    - "SUIJPY"
    - "NEARJPY"
    - "APTJPY"
    - "POLJPY"
    - "XLMJPY"
    - "SHIBJPY"
    - "PEPEJPY"
    - "FETJPY"
    - "TAOJPY"
    - "SEIJPY"
    - "LPTJPY"
    - "IOTXJPY"
    - "TRUMPJPY"

  interval_ms: 100
  save_dir: "./replay_buffer/realtime/"
  save_interval_sec: 600

  # P1-A 修法 (2026-05-08)：每次落盘前 REST 重拉 snapshot 替换内存 book，
  # 扔掉 WS 漏 delete 累积的 dust。BJ 流量低 + dust 持续严重，这是核心
  # 治本路径。WS 走 data-stream.binance.vision，REST snapshot 走
  # api.binance.com /api/v3/depth；24 symbols × 1 次 / 600s = 2.4 req/min。
  snapshot_refresh_on_save: true

  retain_days: 7

  retry:
    wait_seconds: 5
