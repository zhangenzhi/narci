recorder:
  # 交易对名称列表 (Binance 现货全部 JPY 交易对，截至 2026-04-15 via exchangeInfo)
  # 共 24 对，主打日元计价策略覆盖
  symbols:
    - "BTCJPY"
    - "ETHJPY"
    - "SOLJPY"
    - "BNBJPY"
    - "XRPJPY"
    - "DOGEJPY"
    - "ADAJPY"
    - "LINKJPY"
    - "LTCJPY"
    - "BCHJPY"
    - "TRXJPY"
    - "SUIJPY"
    - "NEARJPY"
    - "APTJPY"
    - "POLJPY"
    - "XLMJPY"
    - "SHIBJPY"
    - "PEPEJPY"
    - "FETJPY"
    - "TAOJPY"
    - "SEIJPY"
    - "LPTJPY"
    - "IOTXJPY"
    - "TRUMPJPY"
  
  # 市场类型: "spot" (现货) 或 "um_futures" (U本位合约)
  market_type: "spot"
  
  # 深度更新推送频率 (100ms 是 Binance 支持的最高频深度推送)
  interval_ms: 100
  
  # 数据存储根目录 (将按市场类型自动划分子目录，如 ./replay_buffer/realtime/spot/l2/)
  save_dir: "./replay_buffer/realtime/"
  
  # 多少秒将内存数据落盘一次 (生成一个自包含全量快照的 parquet 文件)
  # 10 分钟 = 更大的并行重建粒度，减少文件碎片数量 (144 个/天 vs 1440 个/天)
  save_interval_sec: 600
  
  # 自动清理: 删除超过 N 天的本地 parquet 文件 (已推送至云端后释放磁盘)
  # 设为 0 则不清理
  retain_days: 7

  # 错误重试配置 (WebSocket 断线或快照拉取失败后的等待时间)
  retry:
    wait_seconds: 5

  # API 节点配置 (底层代码支持动态变量 {streams}, {symbol_upper})
  endpoints:
    um_futures:
      ws_url: "wss://fstream.binance.com/stream?streams={streams}"
      snapshot_url: "https://fapi.binance.com/fapi/v1/depth?symbol={symbol_upper}&limit=1000"
    spot:
      ws_url: "wss://stream.binance.com:9443/stream?streams={streams}"
      snapshot_url: "https://api.binance.com/api/v3/depth?symbol={symbol_upper}&limit=1000"